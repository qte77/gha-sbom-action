name: Test action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run action (dry)
        id: sbom
        uses: ./
        with:
          create_pr: "false"

      - name: Verify outputs
        shell: bash
        run: |
          echo "changed=${{ steps.sbom.outputs.changed }}"
          test -f docs/SBOM/syft-scan.spdx.json || { echo "Syft SBOM missing"; exit 1; }
          echo "SBOM generated successfully"
