name: "SBOM Generator (Syft + GitHub Depgraph)"
description: "Generate SPDX SBOM files via GitHub dependency graph and Syft, optionally opening a PR"
author: "qte77"

branding:
  icon: "shield"
  color: "blue"

inputs:
  sbom_dir:
    description: "Directory to store SBOM output files"
    required: false
    default: "docs/SBOM"
  python_version:
    description: "Python version for uv to install"
    required: false
    default: "3.12"
  create_pr:
    description: "Whether to create a PR with SBOM changes"
    required: false
    default: "true"
  github_token:
    description: "GitHub token for API access and PR creation"
    required: true

outputs:
  sbom_dir:
    description: "Path to the directory containing generated SBOM files"
    value: ${{ inputs.sbom_dir }}
  changed:
    description: "Whether SBOM files changed ('true' or 'false')"
    value: ${{ steps.check-changes.outputs.changed }}
  pr_url:
    description: "URL of the created PR (empty if create_pr is false or no changes)"
    value: ${{ steps.create-pr.outputs.pr_url }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      shell: bash
      run: uv python install '${{ inputs.python_version }}'

    - name: Install dependencies
      shell: bash
      run: uv sync

    - name: Create SBOM output directory
      shell: bash
      run: mkdir -p '${{ inputs.sbom_dir }}'

    - name: Export GitHub dependency graph SBOM
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        SBOM_DIR: ${{ inputs.sbom_dir }}
      run: gh api "repos/$REPO/dependency-graph/sbom" --jq '.sbom' > "$SBOM_DIR/github-depgraph.spdx.json"

    - name: Cache Syft DB
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.cache/syft
        key: syft-db-${{ runner.os }}

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

    - name: Generate Syft SPDX SBOM
      shell: bash
      env:
        SBOM_DIR: ${{ inputs.sbom_dir }}
      run: syft dir:. -o spdx-json="$SBOM_DIR/syft-scan.spdx.json"

    - name: Check for changes
      id: check-changes
      shell: bash
      env:
        SBOM_DIR: ${{ inputs.sbom_dir }}
      run: |
        git add "$SBOM_DIR/"
        if git diff --cached --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "No SBOM changes detected"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "SBOM changes detected"
        fi

    - name: Create PR
      id: create-pr
      if: inputs.create_pr == 'true' && steps.check-changes.outputs.changed == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        BRANCH="auto/sbom-update-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH"
        git commit -m "docs: update SBOM"
        git push -u origin "$BRANCH"
        PR_URL=$(gh pr create --base main --head "$BRANCH" \
          --title "docs: update SBOM" \
          --body "Auto-generated SBOM update by [gha-sbom-action](https://github.com/qte77/gha-sbom-action)")
        echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
