name: "Generate SBOM"
description: "Generate SPDX SBOM via GitHub dependency graph and Syft"
author: "qte77"

branding:
  icon: shield
  color: blue

inputs:
  github_token:
    description: "GitHub token for API access and PR creation"
    required: true
    default: ${{ github.token }}
  sbom_dir:
    description: "Output directory for SBOM files"
    required: false
    default: "docs/SBOM"
  create_pr:
    description: "Create a PR with changes (true/false)"
    required: false
    default: "true"

outputs:
  changed:
    description: "Whether SBOM files changed (true/false)"
    value: ${{ steps.detect.outputs.changed }}
  pr_url:
    description: "URL of created PR (empty if unchanged or create_pr=false)"
    value: ${{ steps.pr.outputs.pr_url }}

runs:
  using: "composite"
  steps:
    - name: Create SBOM output directory
      shell: bash
      run: mkdir -p "${{ inputs.sbom_dir }}"

    - name: Export GitHub dependency graph SBOM
      id: depgraph
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ github.repository }}
        SBOM_DIR: ${{ inputs.sbom_dir }}
      run: gh api "repos/$REPO/dependency-graph/sbom" --jq '.sbom' > "$SBOM_DIR/github-depgraph.spdx.json"

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0

    - name: Generate Syft SPDX SBOM
      shell: bash
      env:
        SBOM_DIR: ${{ inputs.sbom_dir }}
      run: syft dir:. -o spdx-json="$SBOM_DIR/syft-scan.spdx.json"

    - name: Detect changes
      id: detect
      shell: bash
      env:
        SBOM_DIR: ${{ inputs.sbom_dir }}
      run: |
        git add "$SBOM_DIR"
        if git diff --cached --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create PR
      id: pr
      if: steps.detect.outputs.changed == 'true' && inputs.create_pr == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        BRANCH="auto/sbom-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH"
        git commit -m "docs: update SBOM"
        git push -u origin "$BRANCH"
        PR_URL=$(gh pr create --base main --head "$BRANCH" \
          --title "docs: update SBOM" \
          --body "Auto-generated by [gha-sbom-action](https://github.com/qte77/gha-sbom-action)")
        echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
